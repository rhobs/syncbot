name: ACM Prometheus merger

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 1,15 * *' #@biweekly
  pull_request:
    paths:
    - '.github/workflows/merge-acm-flow.yaml'
    - '.github/workflows/merge-acm-prometheus.yaml'
  push:
    paths:
    - '.github/workflows/merge-acm-flow.yaml'
    - '.github/workflows/merge-acm-prometheus.yaml'
jobs:
  acm-prometheus-merge:
    uses: ./.github/workflows/merge-acm-flow.yaml
    with:
      upstream: prometheus/prometheus
      downstream: stolostron/prometheus
      sandbox: rhobs/acm-prometheus
      go-mod-tidy: false
      restore-downstream: >-
        plugins.yml
        plugins
      restore-upstream: >-
        CHANGELOG.md
        Makefile
        VERSION
        go.mod
        go.sum
        .golangci.yml
      assets-cmd: |
        # Debug: Check Makefile state
        echo "=== Makefile lines 120-130 ==="
        sed -n '120,130p' Makefile || echo "Failed to read Makefile"
        echo "=== Test make syntax ==="
        if ! make -n assets-compress >/dev/null 2>&1; then
          echo "ERROR: Makefile has syntax errors!"
          echo "=== Lines with 'else' ==="
          grep -n 'else' Makefile || echo "No 'else' found"
        fi

        # Only compress assets if assets actually changed
        # The git diff relies on gits remote naming. The merge-flow checks out
        # $downstream as origin at the time of writing this code.
        if ! git diff --exit-code --name-only  origin/main web/ui; then
          rm -rf web/ui/static
          make assets-compress
          find web/ui/static -type f -name '*.gz' -exec git add {} \;
          git add web/ui
          git diff --cached --exit-code --name-only || git commit -s -m "[bot] assets: generate"
        fi

    secrets:
      pr-app-id: ${{ secrets.ACM_APP_ID }}
      pr-app-private-key: ${{ secrets.ACM_APP_PRIVATE_KEY }}
      cloner-app-id: ${{ secrets.ACM_CLONER_APP_ID }}
      cloner-app-private-key: ${{ secrets.ACM_CLONER_APP_PRIVATE_KEY }}
      slack-webhook-url: ${{ secrets.ACM_SLACK_WEBHOOK_URL }}
