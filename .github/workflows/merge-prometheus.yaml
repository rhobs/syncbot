name: Prometheus merger

on:
  workflow_dispatch:
  workflow_call:
    inputs:
      upstream-version-regex:
        description: XXX
        required: false
        default: '^v\d+\.\d+\.\d+$'
        type: string
      sandbox-branch-prefix:
        description: XXX
        required: false
        default: 'automated-updates'
        type: string
      pr-labels:
        description: XXX
        required: false
        default: ''
        type: string
      pr-title-prefix:
        description: XXX
        required: false
        default: ''
        type: string
    secrets:
      cloner-app-id:
        description: Github ID of cloner app
        required: true
      cloner-app-private-key:
        description: Github private key of cloner app
        required: true
      pr-app-id:
        description: Github ID of PR creation app
        required: true
      pr-app-private-key:
        description: Github private key of PR creation app
        required: true
      slack-webhook-url:
        description: Slack webhook URL to send notification
        required: true
  schedule:
    - cron: '0 0 * * *' #@daily
  pull_request:
    paths:
    - '.github/workflows/merge-flow.yaml'
    - '.github/workflows/merge-prometheus.yaml'
  push:
    paths:
    - '.github/workflows/merge-flow.yaml'
    - '.github/workflows/merge-prometheus.yaml'
jobs:
  prometheus-merge:
    uses: ./.github/workflows/merge-flow.yaml
    with:
      upstream: prometheus/prometheus
      upstream-version-regex: ${{ inputs.upstream-version-regex }}
      downstream: openshift/prometheus
      sandbox: rhobs/prometheus
      sandbox-branch-prefix: ${{ inputs.sandbox-branch-prefix }}
      pr-labels: ${{ inputs.pr-labels }}
      pr-title-prefix: ${{ inputs.pr-title-prefix }}
      go-version: "1.21"
      restore-upstream: >-
        CHANGELOG.md
        VERSION
        go.mod
        go.sum
        .golangci.yml
      assets-cmd: |
        # Only compress assets if assets actually changed
        # The git diff relies on gits remote naming. The merge-flow checks out
        # $downstream as origin at the time of writing this code.
        if ! git diff --exit-code origin/master web/ui; then
          make assets-compress
          find web/ui/static -type f -name '*.gz' -exec git add {} \;
          git add web/ui/embed.go
          git diff --cached --exit-code || git commit -s -m "[bot] assets: generate"
        fi

    secrets:
      pr-app-id: ${{ secrets.APP_ID }}
      pr-app-private-key: ${{ secrets.APP_PRIVATE_KEY }}
      cloner-app-id: ${{ secrets.CLONER_APP_ID }}
      cloner-app-private-key: ${{ secrets.CLONER_APP_PRIVATE_KEY }}
      slack-webhook-url: ${{ secrets.SLACK_WEBHOOK_URL }}
